# Deploys the caregiver wellness course website (including the built
# Wellness Wheel app under website/app/) to GitHub Pages.
#
# One-time setup (repo admin): Settings -> Pages -> Source: "GitHub Actions".
# After that, every push to the default branch redeploys the site, and the
# workflow can also be run by hand from the Actions tab (workflow_dispatch).
#
# Note: on a free GitHub plan, Pages requires the repository to be public.
# If this repo must stay private, use Cloudflare Pages or Netlify (both have
# free tiers that work with private repos) pointed at the
# caregiver-wellness-course/website folder instead.
name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "caregiver-wellness-course/website/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: caregiver-wellness-course/website
      - id: deployment
        uses: actions/deploy-pages@v4
