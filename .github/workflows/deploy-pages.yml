# Deploys the caregiver wellness course website (including the built
# Wellness Wheel app under website/app/) to GitHub Pages.
#
# One-time setup (repo admin): Settings -> Pages -> Source: "GitHub Actions".
# After that, every push to a branch listed below redeploys the site, and the
# workflow can also be run by hand from the Actions tab (workflow_dispatch).
#
# IMPORTANT: this repo's default branch is currently the auto-generated
# `claude/eloquent-curie-4jElo`, not `main` -- both are listed below so the
# workflow fires either way. Once you settle on a permanent default branch,
# update the `branches` list to match (Settings -> Branches) so pushes there
# trigger a deploy.
#
# Note: on a free GitHub plan, Pages requires the repository to be public.
# If this repo must stay private, use Cloudflare Pages or Netlify (both have
# free tiers that work with private repos) pointed at the
# caregiver-wellness-course/website folder instead (after running the build
# step below to regenerate website/app/).
name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/eloquent-curie-4jElo
    paths:
      - "caregiver-wellness-course/website/**"
      - "caregiver-wellness-course/app/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: caregiver-wellness-course/app/package-lock.json
      - name: Build the Wellness Wheel app
        working-directory: caregiver-wellness-course/app
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: caregiver-wellness-course/website
      - id: deployment
        uses: actions/deploy-pages@v4
