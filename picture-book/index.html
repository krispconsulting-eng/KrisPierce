<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Will and the Missing Highland Cow</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root {
    --paper: #FDFAF4;
    --shelf: #EFE7D8;
    --ink: #2B2520;
    --muted: #8A7B66;
    --hairline: #E9E0D2;
    --accent: #7A4530;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--shelf); color: var(--ink);
    font-family: Literata, 'Iowan Old Style', Georgia, serif;
    overflow: hidden;
  }

  /* ---------- stage ---------- */
  #book { position: fixed; inset: 0 0 44px 0; display: grid; place-items: center; }
  .page {
    width: min(100vw - 16px, (100vh - 76px) * 2);
    aspect-ratio: 2 / 1;
    position: relative;
    container-type: inline-size;
    background: var(--paper);
    border-radius: 6px;
    box-shadow: 0 10px 40px rgba(43, 37, 32, 0.18), 0 2px 8px rgba(43, 37, 32, 0.12);
    overflow: hidden;
  }
  .page.turn { animation: turn 0.55s ease both; }
  @keyframes turn { from { opacity: 0.35; } to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .page.turn { animation: none; } }

  .art, .art svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* ---------- text plates ---------- */
  .plate {
    position: absolute;
    max-width: 42cqw;
    padding: 1.6cqw 2cqw;
    background: rgba(253, 250, 244, 0.88);
    border-radius: 1.2cqw;
    box-shadow: 0 0.3cqw 1.6cqw rgba(43, 37, 32, 0.10);
  }
  .plate p {
    margin: 0;
    font-size: 1.72cqw;
    line-height: 1.58;
    letter-spacing: 0.002em;
  }
  .zone-tl { top: 4cqw; left: 4cqw; }
  .zone-tr { top: 4cqw; right: 4cqw; }
  .zone-tc { top: 3.4cqw; left: 50%; transform: translateX(-50%); max-width: 56cqw; text-align: center; }
  .zone-bl { bottom: 4cqw; left: 4cqw; }
  .zone-br { bottom: 4cqw; right: 4cqw; }
  .zone-bc { bottom: 3.4cqw; left: 50%; transform: translateX(-50%); max-width: 56cqw; text-align: center; }
  .plate-light {
    background: rgba(36, 44, 62, 0.72);
    color: #F4EDDC;
    box-shadow: 0 0.3cqw 1.6cqw rgba(20, 24, 34, 0.35);
  }

  /* ---------- cover ---------- */
  .cover-titles {
    position: absolute; top: 4.5cqw; left: 0; right: 0;
    text-align: center; padding: 0 8cqw;
  }
  .cover-eyebrow {
    font-family: Archivo, system-ui, sans-serif;
    font-size: 1.15cqw; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 1cqw;
  }
  .cover-titles h1 {
    margin: 0; font-size: 5.6cqw; line-height: 1.08; font-weight: 700;
    letter-spacing: -0.01em; text-wrap: balance;
  }
  .cover-titles .amp { font-style: italic; font-weight: 400; font-size: 0.62em; }
  .cover-byline { margin-top: 1.4cqw; font-size: 1.9cqw; font-style: italic; color: #4A3F33; }

  /* ---------- back matter ---------- */
  .endmatter {
    position: absolute; inset: 0; overflow: auto;
    padding: 5cqw 12cqw; background: var(--paper);
  }
  .end-mark { text-align: center; font-size: 3cqw; font-style: italic; margin: 2cqw 0 4cqw; }
  .endmatter h2 {
    font-family: Archivo, system-ui, sans-serif; font-size: 1.15cqw; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent);
    border-top: 1px solid var(--hairline); padding-top: 2cqw; margin: 2.6cqw 0 1cqw;
  }
  .endmatter p { font-size: 1.55cqw; line-height: 1.7; margin: 0 0 1.2cqw; }
  .endmatter .imprint { color: var(--muted); font-size: 1.25cqw; margin-top: 2cqw; }

  /* ---------- chrome ---------- */
  .navbtn {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 5; width: 52px; height: 52px; border-radius: 50%;
    border: 1px solid var(--hairline); background: rgba(253, 250, 244, 0.92);
    color: var(--ink); font-size: 22px; line-height: 1; cursor: pointer;
    box-shadow: 0 2px 10px rgba(43, 37, 32, 0.15);
    transition: background 0.2s ease;
  }
  .navbtn:hover:not(:disabled) { background: #fff; }
  .navbtn:disabled { opacity: 0; pointer-events: none; }
  .navbtn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
  #prev { left: 14px; }
  #next { right: 14px; }
  #counter {
    position: fixed; left: 0; right: 0; bottom: 10px; text-align: center;
    font-family: Archivo, system-ui, sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
    pointer-events: none;
  }

  /* ---------- narrow screens ---------- */
  @media (max-aspect-ratio: 5/4) {
    #book { inset: 0 0 40px 0; }
    .page { width: calc(100vw - 8px); }
    .plate { max-width: 60cqw; }
    .plate p { font-size: 2.1cqw; }
  }

  /* ---------- print: one spread per landscape page ---------- */
  @media print {
    @page { size: A4 landscape; margin: 6mm; }
    body { background: #fff; overflow: visible; }
    #book { position: static; display: block; }
    .page {
      display: block !important; width: 100%; box-shadow: none; border-radius: 0;
      page-break-after: always; break-inside: avoid; margin: 0 0 4mm;
    }
    .page[hidden] { display: block !important; }
    .navbtn, #counter { display: none !important; }
    .endmatter { position: absolute; overflow: visible; }
  }
</style>
</head>
<body>
<button class="navbtn" id="prev" aria-label="Previous page">&#8592;</button>
<button class="navbtn" id="next" aria-label="Next page">&#8594;</button>
<main id="book" aria-live="polite"></main>
<div id="counter"></div>

<script src="art.js"></script>
<script src="scenes-a.js"></script>
<script src="scenes-b.js"></script>
<script src="scenes-c.js"></script>
<script src="scenes-d.js"></script>
<script src="book.js"></script>
</body>
</html>
