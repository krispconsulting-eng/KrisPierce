<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #666; }
  .f { width: 1000px; height: 1000px; margin: 10px auto; background: #fff; position: relative; }
  .f svg { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<!-- VALUE STUDIES — square trim, black / white / one grey (#9E9E9E).
     Rocky = 60–70% visual mass, horns never cropped.
     Eye path: title → Rocky → Will/Cleo → title. -->

<!-- V1 · BREAKOUT DIAGONAL — Rocky strides down a diagonal hill, title
     upper-left, Will+Cleo lower-left close the loop. Rest: upper-right sky. -->
<div class="f" id="v1">
<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="1000" fill="#fff"/>
  <!-- grey hill diagonal -->
  <path d="M0 520 Q 300 430 560 500 T 1000 640 L1000 1000 L0 1000 Z" fill="#9E9E9E"/>
  <!-- title mass: three rough bars upper-left -->
  <g fill="#111">
    <rect x="70" y="80" width="360" height="64" rx="10"/>
    <rect x="70" y="160" width="500" height="64" rx="10"/>
    <rect x="70" y="240" width="300" height="52" rx="10"/>
  </g>
  <!-- broken fence he came through: posts + snapped rails, mid-left behind him -->
  <g fill="#111">
    <rect x="120" y="470" width="22" height="110" rx="8" transform="rotate(-6 131 525)"/>
    <rect x="230" y="462" width="22" height="112" rx="8" transform="rotate(9 241 518)"/>
    <rect x="150" y="492" width="120" height="16" rx="8" transform="rotate(24 210 500)"/>
    <rect x="205" y="540" width="110" height="16" rx="8" transform="rotate(-18 260 548)"/>
  </g>
  <!-- ROCKY: big black silhouette, mid-stride to the right, downhill -->
  <g fill="#111" transform="translate(560 610) rotate(4)">
    <!-- tail up -->
    <path d="M-268 -160 q-50 18 -46 78 q6 34 34 34 q-14 -44 22 -84 Z"/>
    <!-- body: chunky, shaggy bottom -->
    <path d="M-280 -140 q30 -96 190 -104 q150 -8 216 60 q30 34 22 88
             q-8 46 -36 64 l-6 34 -34 -2 -8 -30
             q-30 12 -74 12 l-4 34 -34 0 -8 -34 -50 -2 -6 36 -34 0 -8 -38
             q-42 -8 -66 -28 l-10 34 -34 -2 -2 -44 q-24 -34 -14 -78 Z"/>
    <!-- striding legs -->
    <path d="M-240 -40 l40 6 -14 118 -38 -4 Z"/>
    <path d="M-120 -30 l38 2 6 116 -40 2 Z"/>
    <path d="M40 -36 l40 -4 22 112 -40 8 Z"/>
    <path d="M150 -60 l36 -12 44 104 -36 14 Z"/>
    <!-- head: high and smug, chest out -->
    <path d="M120 -180 q10 -66 78 -74 q66 -8 88 42 q16 40 -6 74 q-26 38 -84 30 q-62 -8 -76 -72 Z"/>
    <!-- fringe bump -->
    <path d="M128 -244 q48 -42 112 -16 q32 14 26 46 q-64 -26 -130 8 Z"/>
    <!-- muzzle: slight smug lift -->
    <path d="M262 -156 q34 6 36 34 q2 24 -26 30 q-30 6 -40 -22 q-8 -30 30 -42 Z"/>
    <!-- horns: never cropped; far horn clean, near horn cocked -->
    <path d="M150 -252 q-64 -18 -84 -84 q-4 -16 12 -14 q14 44 84 62 Z"/>
    <path d="M226 -258 q10 -74 74 -100 q16 -6 16 12 q-44 30 -52 92 Z" transform="rotate(26 250 -230)"/>
  </g>
  <!-- WILL + CLEO, lower-left, watching (black on grey) -->
  <g fill="#111" transform="translate(150 892)">
    <!-- Will: still, hands in pockets, slight head tilt -->
    <path d="M0 0 l0 -96 q-2 -34 24 -36 q26 -2 28 34 l2 98 -18 0 -4 -70 -8 0 -4 70 Z"/>
    <circle cx="27" cy="-150" r="22" transform="rotate(-6 27 -150)"/>
    <!-- Cleo sitting at his side, head up, judging -->
    <path d="M84 0 q-10 -52 22 -66 q26 -10 34 12 q8 20 4 54 Z"/>
    <circle cx="122" cy="-72" r="15"/>
    <path d="M108 -80 q-12 6 -10 26 q10 2 16 -6 Z"/>
  </g>
</svg>
</div>

<!-- V2 · BIG DUSK SKY — low black land band, Rocky breaking the horizon into
     a grey sky, reversed-out title floats in the sky. Rest: left sky. -->
<div class="f" id="v2">
<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="1000" fill="#9E9E9E"/>
  <!-- title mass reversed white, top-centre-left -->
  <g fill="#fff">
    <rect x="120" y="95" width="330" height="62" rx="10"/>
    <rect x="120" y="175" width="470" height="62" rx="10"/>
    <rect x="120" y="255" width="280" height="50" rx="10"/>
  </g>
  <!-- black land band, low horizon with a rise to the right -->
  <path d="M0 800 q220 -30 420 -16 q120 8 220 -36 q180 -76 360 -60 L1000 1000 L0 1000 Z" fill="#111"/>
  <!-- fence line marching along the horizon, broken at Rocky -->
  <g fill="#111">
    <rect x="40" y="742" width="18" height="72" rx="7"/>
    <rect x="150" y="736" width="18" height="76" rx="7"/>
    <rect x="260" y="732" width="18" height="78" rx="7"/>
    <rect x="30" y="756" width="260" height="13" rx="6"/>
    <rect x="30" y="788" width="260" height="13" rx="6"/>
    <rect x="368" y="726" width="18" height="80" rx="7" transform="rotate(-14 377 766)"/>
    <rect x="300" y="758" width="90" height="13" rx="6" transform="rotate(16 345 764)"/>
  </g>
  <!-- ROCKY: black silhouette over the horizon rise, right third, striding right -->
  <g fill="#111" transform="translate(600 742) scale(1.06)">
    <path d="M-238 -128 q-46 14 -44 66 q4 30 30 32 q-12 -40 20 -76 Z"/>
    <path d="M-250 -110 q24 -88 170 -96 q136 -8 196 52 q28 32 20 80 q-8 42 -34 58
             q-26 16 -78 20 q-70 6 -128 -10 q-58 -16 -76 -50 q-14 -28 -10 -54 Z"/>
    <path d="M-208 -20 l36 4 -10 96 -34 -2 Z"/>
    <path d="M-104 -14 l34 2 4 94 -36 0 Z"/>
    <path d="M36 -18 l36 -4 18 92 -36 6 Z"/>
    <path d="M132 -40 l32 -10 38 86 -32 12 Z"/>
    <path d="M104 -160 q8 -58 70 -66 q60 -6 80 38 q14 36 -6 66 q-24 34 -76 26 q-56 -8 -68 -64 Z"/>
    <path d="M122 -212 q36 -30 86 -10 q24 10 20 36 q-52 -20 -104 6 Z"/>
    <path d="M232 -140 q30 6 32 30 q2 22 -24 27 q-27 5 -36 -20 q-7 -27 28 -37 Z"/>
    <path d="M130 -224 q-58 -16 -76 -76 q-3 -14 11 -12 q13 40 76 56 Z"/>
    <path d="M200 -230 q9 -66 66 -90 q14 -5 14 11 q-39 27 -46 82 Z" transform="rotate(28 222 -204)"/>
  </g>
  <!-- WILL + CLEO on the left horizon bump, small, silhouetted into the sky -->
  <g fill="#111" transform="translate(140 776)">
    <path d="M0 0 l0 -84 q-2 -30 21 -32 q23 -2 25 30 l2 86 -16 0 -3 -62 -7 0 -4 62 Z"/>
    <circle cx="24" cy="-132" r="19" transform="rotate(-6 24 -132)"/>
    <path d="M72 0 q-9 -46 19 -58 q23 -9 30 10 q7 18 4 48 Z"/>
    <circle cx="106" cy="-64" r="13"/>
    <path d="M94 -71 q-11 5 -9 23 q9 2 14 -5 Z"/>
  </g>
</svg>
</div>

<!-- V3 · THE LOOK-BACK — Rocky huge in the right two-thirds, glancing back
     at Will+Cleo; foreground grass breaks the frame. Rest: upper-right sky. -->
<div class="f" id="v3">
<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="1000" fill="#fff"/>
  <!-- grey ground bowl -->
  <path d="M0 640 q260 -70 520 -30 q260 40 480 -10 L1000 1000 L0 1000 Z" fill="#9E9E9E"/>
  <!-- title mass top-left -->
  <g fill="#111">
    <rect x="80" y="90" width="340" height="62" rx="10"/>
    <rect x="80" y="170" width="480" height="62" rx="10"/>
    <rect x="80" y="250" width="270" height="50" rx="10"/>
  </g>
  <!-- gap in the fence on the LEFT edge — where he got out; leads to Will+Cleo -->
  <g fill="#111">
    <rect x="0" y="600" width="20" height="104" rx="8"/>
    <rect x="96" y="596" width="20" height="106" rx="8" transform="rotate(10 106 649)"/>
    <rect x="0" y="622" width="104" height="15" rx="7"/>
    <rect x="0" y="662" width="80" height="15" rx="7" transform="rotate(8 40 669)"/>
  </g>
  <!-- ROCKY: massive, walking off right, head turned BACK over his shoulder -->
  <g fill="#111" transform="translate(648 736) scale(1.26)">
    <!-- tail flag toward the exit -->
    <path d="M226 -150 q52 10 56 64 q0 30 -26 36 q6 -42 -34 -72 Z"/>
    <!-- body striding right -->
    <path d="M-226 -122 q26 -92 178 -100 q142 -8 204 54 q30 32 22 82 q-8 44 -36 60
             q-28 16 -82 20 q-74 6 -134 -10 q-60 -16 -80 -52 q-14 -28 -10 -54 Z" transform="scale(-1,1)"/>
    <path d="M208 -22 l-38 4 10 100 36 -2 Z"/>
    <path d="M100 -16 l-36 2 -4 98 38 0 Z"/>
    <path d="M-44 -20 l-38 -4 -18 96 38 6 Z"/>
    <path d="M-140 -44 l-34 -10 -40 90 34 12 Z"/>
    <!-- head turned back (to the left), high and smug -->
    <path d="M-118 -178 q-12 -62 -78 -70 q-64 -6 -84 40 q-14 38 8 68 q26 36 80 28 q60 -8 74 -66 Z"/>
    <!-- fringe -->
    <path d="M-136 -234 q-40 -32 -92 -10 q-26 12 -20 38 q54 -22 110 6 Z"/>
    <!-- smug muzzle -->
    <path d="M-256 -152 q-32 6 -33 32 q-1 24 26 29 q28 5 37 -21 q8 -28 -30 -40 Z"/>
    <!-- horns: near horn cocked (the crooked one), far horn clean -->
    <path d="M-146 -240 q58 -16 74 -72 q3 -14 -10 -12 q-14 38 -76 52 Z"/>
    <path d="M-212 -246 q-8 -62 -62 -84 q-14 -6 -14 10 q37 26 43 78 Z" transform="rotate(-16 -232 -220)"/>
  </g>
  <!-- WILL + CLEO lower-left, at the gap, watching him go -->
  <g fill="#111" transform="translate(170 900)">
    <path d="M0 0 l0 -100 q-2 -36 26 -38 q28 -2 30 36 l2 102 -19 0 -4 -74 -9 0 -5 74 Z"/>
    <circle cx="29" cy="-158" r="23" transform="rotate(-6 29 -158)"/>
    <path d="M92 0 q-11 -55 23 -70 q28 -11 37 13 q8 21 4 57 Z"/>
    <circle cx="133" cy="-77" r="16"/>
    <path d="M118 -85 q-13 6 -11 27 q11 3 17 -6 Z"/>
  </g>
  <!-- foreground grass breaking the bottom frame edge -->
  <g fill="#111">
    <path d="M20 1000 q-4 -60 18 -96 q6 44 10 96 Z"/>
    <path d="M60 1000 q10 -50 34 -70 q-6 36 -12 70 Z"/>
    <path d="M905 1000 q-6 -66 20 -104 q8 48 12 104 Z"/>
    <path d="M950 1000 q12 -54 38 -76 q-8 40 -14 76 Z"/>
  </g>
</svg>
</div>
</body>
</html>
