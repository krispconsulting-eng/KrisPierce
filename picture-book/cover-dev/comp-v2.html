<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../fonts.css">
<style>
  body { margin: 0; background: #666; font-family: Literata, Georgia, serif; }
  .f { width: 1000px; height: 1000px; margin: 12px auto; position: relative; overflow: hidden; }
  .f svg { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<script>
/* Cover v2 — the fence-breakout is now RESERVED for the story interior.
   Cover shows Rocky as the smug scene-stealer standing his ground:
   "big, shaggy, trouble." Will + Cleo watch, lower-left. Same painted
   depth (far/mid/near hills, one low-right sun, lower-left shadows,
   frame-breaking grass). Title = Literata placeholder for lettering stage.
   Atmosphere held at soft-dusk A (still open: A/B/C). */

function comp(id, rocky, ry, rw, rh, rx) {
  const sky = [[0, '#C9DCE4'], [0.38, '#EED9B4'], [0.62, '#F2C29B']];
  return `
  <div class="f" id="${id}">
  <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
      <linearGradient id="sky-${id}" x1="0" y1="0" x2="0" y2="1">
        ${sky.map(([o, c]) => `<stop offset="${o}" stop-color="${c}"/>`).join('')}
      </linearGradient>
      <filter id="soft-${id}" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8"/></filter>
    </defs>
    <rect width="1000" height="1000" fill="url(#sky-${id})"/>

    <!-- sun low-right -->
    <circle cx="850" cy="290" r="118" fill="#F7D9A0" opacity="0.30"/>
    <circle cx="850" cy="290" r="52" fill="#F7D9A0" opacity="0.95"/>

    <!-- far hill (cooler+lighter) → mid → near -->
    <path d="M0 560 Q 250 480 520 530 T 1000 520 L1000 1000 L0 1000 Z" fill="#B4BFA0"/>
    <rect x="0" y="440" width="1000" height="210" fill="#EED9B4" opacity="0.32"/>
    <path d="M0 640 Q 320 560 640 630 T 1000 700 L1000 1000 L0 1000 Z" fill="#7E9A5E"/>
    <path d="M0 830 Q 300 790 620 820 T 1000 860 L1000 1000 L0 1000 Z" fill="#55703F"/>

    <!-- cast shadows to lower-LEFT (sun is low-right) -->
    <ellipse cx="${rx + rw*0.34}" cy="905" rx="${rw*0.42}" ry="30" fill="#3E5530" opacity="0.30" filter="url(#soft-${id})"/>
    <ellipse cx="150" cy="910" rx="100" ry="19" fill="#3E5530" opacity="0.30" filter="url(#soft-${id})"/>
    <ellipse cx="330" cy="915" rx="64" ry="14" fill="#3E5530" opacity="0.30" filter="url(#soft-${id})"/>

    <!-- ROCKY, standing his ground, the scene-stealer -->
    <image href="assets/${rocky}" x="${rx}" y="${ry}" width="${rw}" height="${rh}" preserveAspectRatio="xMidYMid meet"/>

    <!-- WILL + CLEO watching, lower-left -->
    <image href="assets/will-15-cut.png" x="70" y="672" width="232" height="236.7" preserveAspectRatio="xMidYMid meet"/>
    <g transform="translate(392 800) scale(-1,1)">
      <image href="assets/cleo-05-cut.png" x="0" y="0" width="126" height="121" preserveAspectRatio="xMidYMid meet"/>
    </g>

    <!-- foreground grass breaking the frame edge -->
    <g fill="#55703F">
      <path d="M18 1000 q-6 -70 20 -110 q8 52 12 110 Z" opacity="0.9"/>
      <path d="M58 1000 q12 -58 40 -80 q-8 42 -14 80 Z" opacity="0.85"/>
      <path d="M905 1000 q-8 -76 22 -118 q10 54 14 118 Z" opacity="0.9"/>
      <path d="M952 1000 q14 -60 42 -84 q-10 44 -16 84 Z" opacity="0.85"/>
    </g>

    <!-- title PLACEHOLDER (hand-lettering to follow) -->
    <g font-family="Literata, Georgia, serif" fill="#2B2520">
      <text x="72" y="150" font-size="86" font-weight="700" letter-spacing="-1">Will <tspan font-style="italic" font-weight="400" font-size="56">and the</tspan></text>
      <text x="72" y="248" font-size="86" font-weight="700" letter-spacing="-1">Missing</text>
      <text x="72" y="346" font-size="86" font-weight="700" letter-spacing="-1">Highland Cow</text>
    </g>
    <text x="72" y="958" font-family="Literata, Georgia, serif" font-style="italic" font-size="30" fill="#4A3F33">Kris Pierce &amp; Will Pierce</text>
  </svg>
  </div>`;
}

/* rocky-14: standing, chewing a stolen sprig, faces left (toward Will/Cleo) */
document.write(comp('graze', 'rocky-14-cut.png', 400, 512, 504, 318));
/* rocky-16: advancing on the viewer, chest-first, cheeky */
document.write(comp('advance', 'rocky-16-cut.png', 430, 520, 466, 320));
</script>
</body>
</html>
