<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Free Wellness Wheel Assessment — Caregiver Wellness Course</title>
<meta name="description" content="Take the free 64-question Wellness Wheel assessment built for family caregivers of people with rare diseases.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
<link rel="stylesheet" href="assets/styles.css">
<style>
  /* This page hosts the Wellness Wheel app, which has its own internal
     header, so the site chrome here stays minimal. */
  .mini-bar {
    background: var(--color-cream);
    border-bottom: 1px solid var(--color-border);
    padding: 10px 0;
  }
  .mini-bar .container { display: flex; align-items: center; justify-content: space-between; }
  .mini-bar a { font-size: .9rem; font-weight: 600; }
  #wheel-root { min-height: 60vh; }
  .loading-note { text-align: center; padding: 80px 24px; color: var(--color-muted); }
</style>
</head>
<body>

<div class="mini-bar">
  <div class="container">
    <a href="index.html">← Back to the course</a>
    <span class="text-muted" style="font-size:.85rem;">Free assessment · no account needed</span>
  </div>
</div>

<div id="wheel-root">
  <p class="loading-note">Loading your Wellness Wheel…</p>
</div>

<p class="disclaimer" style="padding:24px;">This is a wellbeing programme, not a substitute for medical or mental health care. If you're in crisis, please contact a crisis line or your GP.</p>

<!--
  Zero-build setup: classic React 18 + ReactDOM 18 UMD builds from a CDN,
  plus Babel standalone to transform JSX at load time. No npm install, no
  bundler, works by just opening this page.

  assets/wellness-wheel.browser.jsx is a generated adaptation of
  ../wellness-wheel.jsx (the canonical source) for this classic-script
  environment: the `import ... from "react"` line is replaced with
  `const { useState, useEffect, useRef } = React;` and the component is a
  plain `function App()` instead of a module export, since classic
  <script type="text/babel"> tags share one global scope rather than
  supporting ES module imports. If you edit wellness-wheel.jsx, regenerate
  the browser build with the same substitution (see website/README.md).

  Before a real cohort launches, replace this with a proper build (Vite/
  CRA) per the architecture doc's §4.2 rebuild note — this CDN approach is
  fine for a marketing preview, not for production load times.
-->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script type="text/babel" src="assets/wellness-wheel.browser.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('wheel-root'));
  root.render(React.createElement(App));
</script>
</body>
</html>
