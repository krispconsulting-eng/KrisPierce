<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wheel Redesign Preview (Aurora Glow) -- not yet live</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/wellness-wheel-aurora.css">
<style>
body.ww-preview-body {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 48px 16px 80px;
background: linear-gradient(150deg, #2B2A55 0%, #5B5FA6 55%, #45C6C6 100%);
}
.ww-preview-note {
max-width: 560px;
margin: 0 auto 36px;
padding: 18px 22px;
border-radius: 16px;
background: rgba(255,255,255,0.92);
border: 1px solid rgba(231,230,248,0.9);
color: #2B2A55;
font: 500 15px/1.5 "Hanken Grotesk", system-ui, sans-serif;
text-align: center;
}
.ww-preview-note strong { display:block; margin-bottom:6px; font-size:16px; }
.ww-preview-back { color:#2B2A55; text-decoration:underline; }
</style>
</head>
<body class="ww-preview-body">
<div class="ww-preview-note">
<strong>Wheel redesign preview -- not live yet</strong>
This is the Aurora Glow redesign of the Wellness Wheel, on its own page so it can be reviewed before it replaces the current hero graphic. <a class="ww-preview-back" href="index.html">Back to the site</a>
</div>

<section class="ww-signature" aria-label="Caregiver Wellbeing Wheel (redesign preview)">
<div class="ww-stage" data-wellness-wheel>
<div class="ww-orbit" aria-hidden="true"></div>

<div class="ww-callout" aria-live="polite">
<div class="ww-callout-card">
<div class="ww-pill">
<span class="ww-dot" data-ww-dot></span>
<span class="ww-name" data-ww-name>Financial</span>
</div>
<div class="ww-tag" data-ww-tag>Some real control over what caring costs.</div>
</div>
<svg class="ww-connector" viewBox="0 0 120 58" aria-hidden="true">
<path d="M60 6 C60 22 60 34 60 48" />
<circle cx="60" cy="51" r="2.8" />
</svg>
</div>

<svg class="ww-svg" viewBox="0 0 360 360" role="img" aria-labelledby="wwTitleAurora wwDescAurora">
<title id="wwTitleAurora">Animated Caregiver Wellbeing Wheel -- Aurora Glow redesign</title>
<desc id="wwDescAurora">Eight wellbeing domains rotate gently in the new Aurora Glow palette. Each domain is highlighted in turn with its name and a short description.</desc>
<defs>
<radialGradient id="wwAmbientAurora" cx="46%" cy="42%" r="58%">
<stop offset="0%" stop-color="#E7E6F8" stop-opacity="0.75" />
<stop offset="56%" stop-color="#E7E6F8" stop-opacity="0.28" />
<stop offset="100%" stop-color="#E7E6F8" stop-opacity="0" />
</radialGradient>
<radialGradient id="wwPaperAurora" cx="42%" cy="36%" r="76%">
<stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92" />
<stop offset="100%" stop-color="#F1F0FB" stop-opacity="0.96" />
</radialGradient>
<filter id="wwSoftShadowAurora" x="-22%" y="-22%" width="144%" height="144%">
<feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2B2A55" flood-opacity="0.18" />
<feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#2B2A55" flood-opacity="0.12" />
</filter>
<filter id="wwLiftShadowAurora" x="-36%" y="-36%" width="172%" height="172%">
<feDropShadow dx="0" dy="15" stdDeviation="13" flood-color="#2B2A55" flood-opacity="0.3" />
<feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2B2A55" flood-opacity="0.14" />
</filter>
</defs>

<circle class="ww-ambient" cx="180" cy="180" r="172" fill="url(#wwAmbientAurora)" />
<g class="ww-breathe">
<g class="ww-wheel" data-ww-wheel filter="url(#wwSoftShadowAurora)"></g>
</g>
</svg>
</div>
</section>
<p style="color:#E7E6F8; font:italic 400 14px/1.4 'Newsreader', Georgia, serif; margin-top:14px; text-align:center;">Your Wellbeing Journey: 8 dimensions, one picture.</p>

<script src="assets/wellness-wheel-aurora.js"></script>
</body>
</html>
